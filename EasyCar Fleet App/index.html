<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>EasyCarSales - Loaner Tracker</title>
    <!-- Signature Pad Library -->
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@5.1.3/dist/signature_pad.umd.min.js"></script>
    <!-- idb library for IndexedDB -->
    <script src="https://cdn.jsdelivr.net/npm/idb@8.0.2/build/umd.js"></script>
    <link href="./css/styles.css" rel="stylesheet" type="text/css"/>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="logo-area">
                <h1>🚘 EasyCarSales</h1>
                <p>Loaner Vehicle Tracker | Nassau, Bahamas</p>
            </div>
            <div class="stats">
                <div class="number" id="activeCount">0</div>
                <div class="label">Active Loaners</div>
            </div>
        </div>

        <!-- Dashboard - Active Loans -->
        <div class="dashboard">
            <h2>📋 Currently Loaned Out</h2>
            <div id="activeLoansList" class="loan-cards">
                <div class="empty-state">No active loans. Check out a vehicle below.</div>
            </div>
        </div>

        <!-- Check-out Form -->
        <div class="checkout-form">
            <h2>🚗 Check Out New Loaner</h2>
            <form id="checkoutForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Select Vehicle *</label>
                        <select id="vehicleSelect" required>
                            <option value="">-- Select a vehicle --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Customer Full Name *</label>
                        <input type="text" id="customerName" placeholder="e.g., John Smith" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number *</label>
                        <input type="tel" id="customerPhone" placeholder="(242) 555-1234" required>
                    </div>
                    <div class="form-group">
                        <label>Expected Return Date *</label>
                        <input type="date" id="returnDate" required>
                    </div>
                </div>

                <!-- Signature Pad -->
                <div class="signature-area">
                    <label>✍️ Customer Signature *</label>
                    <div class="signature-pad">
                        <canvas id="signatureCanvas" width="700" height="200" style="width:100%; height:auto; touch-action:none;"></canvas>
                    </div>
                    <div class="signature-buttons">
                        <button type="button" class="btn-clear" id="clearSignatureBtn">Clear Signature</button>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">✓ Check Out Vehicle</button>
            </form>
        </div>

        <div class="footer">
            <p>© 2025 Precision Auto Body | Loaner Tracker v1.0 | Works Offline</p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
